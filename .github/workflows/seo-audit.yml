name: Weekly SEO Audit

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 09:00 MYT (UTC+8 = UTC 01:00)
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-api-python-client google-analytics-data

      - name: Run audit
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python3 scripts/audit.py

      - name: Generate dashboard
        run: python3 scripts/generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/audit.json docs/index.html
          git diff --staged --quiet || git commit -m "Weekly SEO update $(date +'%Y-%m-%d')"
          git push
